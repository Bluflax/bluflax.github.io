<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="webapp/style.css">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon-blk.png" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/png" href="/favicon-wht.png" media="(prefers-color-scheme: dark)">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="ZhereNext">
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#70ad59">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#37552c">
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">

    
    <link rel="manifest" href="webapp/manifest.json">
    <script src="webapp/script.js"></script>
    
    <title>Zhere</title>
   
</head>
    
<body>
    <h1 class="mainheader">Zhere Next</h1>

    <!-- content -->

    <h2 class="mainsubtitle">Do you know me?</h2>
    <div class="blocked">
        <p class="eventheader">你了解我吗？</p>
        <p class="eventpara">快来答题测试！达到145分的话......元旦获赠一些小礼物！</p>
        <p class="eventpara">分数低不代表情谊浅！人类 请多跟麻花聊天！</p>
        <p class="eventpara">tip: 如果提示打开小程序，点击取消即可。</p>
        <div>
            <a href="https://wj.qq.com/s2/13931334/c144/" class="btncontext" id="GotoSurveytext" target="_blank">查看</a>
        </div>
    </div>



    <h2 class="mainsubtitle">圣诞节</h2>
    <div class="blocked">
        <p id="title" class="eventheader">装饰我的圣诞树!</p>
        <p id="para" class="eventpara">Fetching Data...</p>
        <img src="/assets/xmas.jpg">
        <div>
            <a href="https://bit.ly/bflstree" class="btncontext" id="GotoDecotext" target="_blank">去留言</a>
        </div>
    </div>
    <script>
        fetch('/webapp/title.txt')
            .then(response => response.text())
            .then(data => {
        // 将读取的文本内容设置为按钮的innerHTML
        document.getElementById('title').innerHTML = data;
      })
        .catch(error => console.error('Error fetching file:', error));

         fetch('/webapp/mainpara.txt')
            .then(response => response.text())
            .then(data => {
        // 将读取的文本内容设置为按钮的innerHTML
        document.getElementById('para').innerHTML = data;
      })
        .catch(error => console.error('Error fetching file:', error));
    </script>

    <!--div>
        <a href="https://bit.ly/bflstree" class="btnfloat" id="GotoDecotextFloat" target="_blank">Go to Decomytree.com</a>
    </div-->
    
    <footer>
        <p>2023 BF_located</p>
    </footer>

</body>
</html>
