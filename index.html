<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style.css">
    <link rel="manifest" href="/manifest.json">
    <script src="/script.js"></script>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon-blk.png" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/png" href="/favicon-wht.png" media="(prefers-color-scheme: dark)">

    <link rel="apple-touch-icon" sizes="144x144" href="/assets/apple-touch-icon.png">
    
    <title>Zhere</title>
   
</head>
    
<body>
    <h1 class="mainheader">title</h1>
    <h2 class="mainsubtitle">subtitle</h2>

    <!-- content -->
    <div class="blocked">
        <p id="mainpara" class="eventpara">Fetching Data...</p>
    </div>
    <script>
        fetch('/mainpara.txt')
            .then(response => response.text())
            .then(data => {
        // 将读取的文本内容设置为按钮的innerHTML
        document.getElementById('mainpara').innerHTML = data;
      })
        .catch(error => console.error('Error fetching file:', error));
    </script>

    <div class="btn">
        <a href="https://bit.ly/bflstree" id="btnfloat" class="btnfloat" target="_blank">Go to Decomytree.com</a>
    </div>
    
    <footer>
        <p>2023 BF_located</p>
    </footer>

</body>
</html>
